services:
  xbot:
    build: .
    container_name: xbot
    restart: unless-stopped

    environment:
      # ── Required ──────────────────────────────────────────────
      TWITTER_API_KEY:    ${TWITTER_API_KEY}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID:   ${TELEGRAM_CHAT_ID}
      TARGET_X_USERNAME:  ${TARGET_X_USERNAME}

      # ── Optional ───────────────────────────────────────────────
      TARGET_TRUTH_SOCIAL_USERNAME: ${TARGET_TRUTH_SOCIAL_USERNAME:-}
      # How often to poll, in seconds (default: 300 = 5 minutes)
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-900}

    volumes:
      # Persists the last-seen tweet ID across restarts
      - xbot_data:/data

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  xbot_data:
